<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Nhân Viên - BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; }
        nav { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 20px; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .menu-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s; cursor: pointer; }
        .menu-card:hover { transform: translateY(-5px); }
        .menu-card a { text-decoration: none; color: #333; display: block; }
        .menu-card .icon { font-size: 40px; margin-bottom: 10px; }
        .menu-card h3 { color: #333; margin-bottom: 10px; }
        .menu-card p { color: #666; font-size: 14px; }
        .table { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; border: none; cursor: pointer; transition: 0.3s; }
        .btn-edit { background: #667eea; color: white; }
        .btn-edit:hover { opacity: 0.9; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>👔 Nhân Viên</h1>
            <div style="display: flex; gap: 20px;">
                <a href="{% url 'book_list' %}">🏠 Trang Chủ</a>
                <a href="{% url 'logout' %}">🚪 Đăng Xuất</a>
            </div>
        </nav>
    </header>
    
    <div class="container">
        <h1>Bảng Điều Khiển Nhân Viên</h1>
        
        <div class="menu">
            <div class="menu-card">
                <a href="{% url 'manage_books' %}">
                    <div class="icon">📚</div>
                    <h3>Quản Lý Sách</h3>
                    <p>Thêm, sửa, xóa sách</p>
                </a>
            </div>
            <div class="menu-card">
                <a href="{% url 'manage_promotions' %}">
                    <div class="icon">🎎</div>
                    <h3>Quản Lý Khuyến Mãi</h3>
                    <p>Tạo và quản lý khuyến mãi</p>
                </a>
            </div>
            <div class="menu-card">
                <a href="{% url 'manage_vouchers' %}">
                    <div class="icon">🎫</div>
                    <h3>Quản Lý Voucher</h3>
                    <p>Quản lý mã giảm giá</p>
                </a>
            </div>
        </div>
        
        <div style="text-align: center; color: #666; padding: 40px;">
            <p style="font-size: 18px; margin-bottom: 20px;">Chọn chức năng ở trên để quản lý</p>
        </div>
    </div>
</body>
</html>
